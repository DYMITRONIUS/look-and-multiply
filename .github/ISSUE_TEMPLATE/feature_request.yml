name: Feature Request
description: Suggest an idea or improvement for Look & Multiply.
title: "[Feature]: "
labels: ["enhancement"]

body:
  - type: markdown
    attributes:
      value: |
        Thank you for your suggestion!

  - type: textarea
    id: idea
    attributes:
      label: Describe your idea
      description: What would you like to see added?
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Why would this be useful?
    validations:
      required: true

  - type: textarea
    id: examples
    attributes:
      label: Additional information
      description: Screenshots, examples or other useful details.
